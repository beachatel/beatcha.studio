<!doctype html>
<html lang="en">
  <head>
    <link rel="shortcut icon" type="image/x-icon" href="/beatcha.ico" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>beatcha - cache</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../main.css" />
  </head>
   <script src="../components/toggleDarkMode.js"></script>
    <script src="../components/toggleExperimentalMode.js"></script>
    <script src="../components/copyToClipboard.js"></script>
  <body>
    <div id="header">
      <a href="/"><div class="indexTitle">beatcha</div></a>
      <div class="links">
        <a class="nav" href="/Cache/">cache</a>
      </div>
       <div class="socials">
        <a class="handles" href="https://www.instagram.com/beatcha0/">
          ○instagram
        </a>
        <a class="handles" href="https://github.com/beachatel"> ○github</a>
        <button
          id="copyToClipboard"
          onclick="(writeClipboardText(), onClick())"
        >
          <a class="email"> ○ bchatelbell@gmail.com</a>
        </button>
        <a id="copied">copied!</a>

        <button id="darkModeToggle" onclick="toggleDarkMode()"></button>
        <!-- <button
          id="experimentalModeToggle"
          onclick="toggleExperimentalMode()"
        ></button> -->
      </div>

    <div id="space-between-header-and-media"></div>
    <div class="img-grid-archive" id="grid"></div>


    <script>
      const API =
        "https://beatchacachewp5924.live-website.com/wp-json/wp/v2/posts?_embed&per_page=20";
  
      const grid = document.getElementById("grid");



      // Fetch
      fetch(API)
        .then((r) => {
          return r.json();
        })
        .then((posts) => {
  

          // Create 6 columns
          const cols = Array.from({ length: 6 }, () => {
            const col = document.createElement("div");
            col.className = "Projects";
            return col;
          });

          posts.forEach((post, i) => {
            const media = post._embedded?.["wp:featuredmedia"]?.[0];
            if (!media) return;

            const src = media.source_url;
            const mime = media.mime_type || "";
            let el;

            if (mime.startsWith("video/")) {
              el = document.createElement("video");
              el.src = src;
              el.autoplay = true;
              el.loop = true;
              el.muted = true;
              el.playsInline = true;
              const poster = media.media_details?.sizes?.medium?.source_url;
              if (poster) el.poster = poster;
            } else {
              el = document.createElement("img");
              el.src = src;
              el.alt = media.alt_text || "";
            }

            el.className = "projectImg";
            cols[i % 6].appendChild(el);
          });

          cols.forEach((col) => grid.appendChild(col));
  
        })
        
    </script>
  </body>
   <div class="footer">
    <p>© 2026 Bea Chatel</p>
  </div>
</html>
