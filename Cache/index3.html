<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="shortcut icon" type="image/x-icon" href="/beatcha.ico" />
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>beatcha - cache</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: "IBM Plex Mono";
      overflow-x: hidden;
    }

    html, body { height: 100%; margin: 0; padding: 0; }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .indexTitle {
      display: inline-flex;
      font-size: 1.25em;
      height: 1.5em;
      color: rgb(3, 4, 5);
      border: none;
    }

    .links {
      display: inline-flex;
      font-size: 1.25em;
      margin-left: auto;
      color: rgb(3, 4, 5);
      border: none;
    }

    .socials {
      width: 100%;
      padding-top: 0.25em;
      padding-bottom: 0.25em;
      font-size: 0.8em;
      border-top: 0.1em solid rgb(3, 4, 5);
      display: inline-flex;
      align-items: center;
    }

    a {
      padding: 0;
      text-decoration: none;
      color: rgb(3, 4, 5);
    }
    a.nav   { padding-left: 0.5em; padding-right: 0.5em; }
    a.handles { padding-left: 0.2em; padding-right: 0.2em; }
    a:hover { text-decoration: underline solid rgb(3, 4, 5); }
    a:visited { color: rgb(3, 4, 5) !important; }

    /* ── Dark mode toggle ── */
    #darkModeToggle {
      background-color: transparent;
      border: none;
      color: rgb(3, 4, 5);
      padding: 0.5em;
      font-size: 0.8em;
      cursor: pointer;
      margin-left: auto;
    }
    #darkModeToggle:hover {
      background-color: rgb(3, 4, 5);
      color: rgb(242, 242, 242);
    }

    /* ── Spacer ── */
    #space-between-header-and-media { height: 10px; }

    /* ── 6-column masonry grid ── */
    .img-grid-archive {
      column-count: 6;
      column-gap: 0.3em;
      border-radius: 0.25em;
      padding: 0 0.3em;
    }

    .Projects {
      break-inside: avoid;
      display: inline-block;
      width: 100%;
    }

    video.projectImg,
    img.projectImg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 0.25em;
      object-fit: cover;
      padding-top: 0.3em;
    }

    /* Fade-in on load */
    img.projectImg {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    img.projectImg.loaded { opacity: 1; }

    /* Skeleton shimmer while loading */
    .skeleton {
      width: 100%;
      min-height: 140px;
      display: block;
      border-radius: 0.25em;
      margin-top: 0.3em;
      background: linear-gradient(90deg, #e0e0e0 25%, #efefef 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Loading / error state */
    #status {
      font-size: 0.8em;
      padding: 1em 0.3em;
      color: rgb(0, 30, 255);
    }

    /* ── Footer ── */
    .footer {
      position: sticky;
      top: 100vh;
      font-size: 0.6em;
      padding: 0.5em 0.3em;
    }

    /* ── Dark mode ── */
    body.dark-mode {
      background-color: rgb(3, 4, 5);
      color: rgb(242, 242, 242);
    }
    body.dark-mode .indexTitle,
    body.dark-mode .links,
    body.dark-mode a,
    body.dark-mode .socials {
      color: rgb(242, 242, 242);
      border-top-color: rgb(242, 242, 242);
    }
    body.dark-mode a { color: rgb(242, 242, 242) !important; }
    body.dark-mode a:hover { text-decoration: underline solid white; }
    body.dark-mode .socials { border-top-color: rgb(242, 242, 242); }
    body.dark-mode #darkModeToggle { color: rgb(242, 242, 242); }
    body.dark-mode #darkModeToggle:hover {
      background-color: rgb(242, 242, 242);
      color: rgb(3, 4, 5);
    }
    body.dark-mode .skeleton {
      background: linear-gradient(90deg, #1c1c1c 25%, #2a2a2a 50%, #1c1c1c 75%);
      background-size: 200% 100%;
    }
    body.dark-mode #status { color: rgb(255, 0, 162); }

    /* ── Responsive ── */
    @media (max-width: 1024px) { .img-grid-archive { column-count: 4; } }
    @media (max-width: 525px)  { .img-grid-archive { column-count: 3; } }
    @media (max-width: 500px)  {
      .img-grid-archive { column-count: 2; }
      .links       { font-size: 4vw; }
      .indexTitle  { font-size: 4vw; }
      .socials     { font-size: 2.25vw; }
      #darkModeToggle { font-size: 2.25vw; }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div id="header">
    <a href="/"><div class="indexTitle">beatcha</div></a>
    <div class="links">
      <a class="nav" href="/Cache">cache</a>
    </div>
    <div class="socials">
      <a class="handles" href="https://www.instagram.com/beatcha0/">●instagram</a>
      <a class="handles" href="https://github.com/beachatel">●github</a>
      <button id="darkModeToggle">[ dark ]</button>
    </div>
  </div>

  <div id="space-between-header-and-media"></div>

  <!-- Status / loading message -->
  <div id="status">loading cache…</div>

  <!-- Grid populated by JS -->
  <div class="img-grid-archive" id="grid"></div>

  <div class="footer"><p>© 2026 Bea Chatel</p></div>

  <script>
    /* ─────────────────────────────────────────────
       CONFIG
    ───────────────────────────────────────────── */
    const ENDPOINT   = 'https://beatchacachewp5924.live-website.com/wp-json/wp/v2/posts/?_embed&per_page=100&_fields=id,link,title,_embedded';
    const NUM_COLS   = 6;          // matches column-count in CSS
    const grid       = document.getElementById('grid');
    const statusEl   = document.getElementById('status');

    /* ─────────────────────────────────────────────
       DARK MODE
    ───────────────────────────────────────────── */
    const darkBtn = document.getElementById('darkModeToggle');
    darkBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      darkBtn.textContent = document.body.classList.contains('dark-mode') ? '[ light ]' : '[ dark ]';
    });

    /* ─────────────────────────────────────────────
       INTERSECTION OBSERVER — lazy load images
    ───────────────────────────────────────────── */
    const lazyObserver = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        if (img.dataset.src)    img.src    = img.dataset.src;
        if (img.dataset.srcset) img.srcset = img.dataset.srcset;
        img.onload  = () => { img.classList.add('loaded'); removeSkeleton(img); };
        img.onerror = () => { removeSkeleton(img); };
        obs.unobserve(img);
      });
    }, { rootMargin: '200px' });   // start loading 200px before entering viewport

    function removeSkeleton(img) {
      const sk = img.previousElementSibling;
      if (sk && sk.classList.contains('skeleton')) sk.remove();
    }

    /* ─────────────────────────────────────────────
       BUILD A MEDIA ELEMENT from WP post data
    ───────────────────────────────────────────── */
    function buildMediaEl(post) {
      const embedded   = post._embedded || {};
      const mediaArr   = embedded['wp:featuredmedia'];
      const postLink   = post.link || '#';

      if (!mediaArr || !mediaArr.length) return null;

      const media      = mediaArr[0];
      const mimeType   = media.mime_type || '';
      const fullSrc    = media.source_url || '';

      /* ── VIDEO ── */
      if (mimeType.startsWith('video/')) {
        const video = document.createElement('video');
        video.className  = 'projectImg';
        video.src        = fullSrc;
        video.autoplay   = true;
        video.loop       = true;
        video.muted      = true;
        video.playsInline = true;
        // poster from thumbnail if available
        const thumb = media.media_details?.sizes?.medium?.source_url;
        if (thumb) video.poster = thumb;
        return video;
      }

      /* ── IMAGE ── */
      const sizes   = media.media_details?.sizes || {};

      // Build srcset from all available WP sizes
      const srcsetParts = Object.values(sizes)
        .filter(s => s.source_url && s.width)
        .map(s => `${s.source_url} ${s.width}w`);

      // Pick a reasonable default src (large → medium_large → medium → full)
      const defaultSrc =
        sizes.large?.source_url ||
        sizes.medium_large?.source_url ||
        sizes.medium?.source_url ||
        fullSrc;

      const wrapper = document.createDocumentFragment();
      const skeleton = document.createElement('span');
      skeleton.className = 'skeleton';
      wrapper.appendChild(skeleton);

      const img = document.createElement('img');
      img.className     = 'projectImg';
      img.alt           = media.alt_text || post.title?.rendered || '';
      img.loading       = 'lazy';
      img.decoding      = 'async';
      img.sizes         = '(max-width: 500px) 50vw, (max-width: 1024px) 25vw, 17vw';

      // Use data- attrs so IntersectionObserver swaps them in
      img.dataset.src    = defaultSrc;
      if (srcsetParts.length) img.dataset.srcset = srcsetParts.join(', ');

      lazyObserver.observe(img);

      // Return a fragment — caller must append skeleton then img
      // Instead return an array so caller handles it:
      return [skeleton, img];
    }

    /* ─────────────────────────────────────────────
       DISTRIBUTE posts round-robin across columns
    ───────────────────────────────────────────── */
    function populateGrid(posts) {
      // Create NUM_COLS column divs
      const cols = Array.from({ length: NUM_COLS }, () => {
        const col = document.createElement('div');
        col.className = 'Projects';
        return col;
      });

      posts.forEach((post, i) => {
        const colIndex = i % NUM_COLS;
        const result = buildMediaEl(post);
        if (!result) return;

        if (Array.isArray(result)) {
          // [skeleton, img]
          result.forEach(el => cols[colIndex].appendChild(el));
        } else {
          // video element
          cols[colIndex].appendChild(result);
        }
      });

      cols.forEach(col => grid.appendChild(col));
    }

    /* ─────────────────────────────────────────────
       FETCH — paginate if >100 posts
    ───────────────────────────────────────────── */
    async function fetchAllPosts() {
      let allPosts = [];
      let page     = 1;
      let total    = Infinity;

      while (allPosts.length < total) {
        const res = await fetch(`${ENDPOINT}&page=${page}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        // WP sends X-WP-Total on first page
        if (page === 1) total = parseInt(res.headers.get('X-WP-Total') || '0', 10) || 0;

        const posts = await res.json();
        if (!posts.length) break;

        allPosts = allPosts.concat(posts);
        page++;

        // Safety: if WP returned fewer than per_page, we're done
        if (posts.length < 100) break;
      }

      return allPosts;
    }

    /* ─────────────────────────────────────────────
       INIT
    ───────────────────────────────────────────── */
    (async () => {
      try {
        const posts = await fetchAllPosts();

        if (!posts.length) {
          statusEl.textContent = 'no posts found.';
          return;
        }

        statusEl.remove();
        populateGrid(posts);

      } catch (err) {
        console.error('WP fetch error:', err);
        statusEl.textContent = `error loading posts: ${err.message}`;
      }
    })();
  </script>

</body>
</html>
